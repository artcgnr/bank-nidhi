<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">Admin Panel</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="shortcut icon" type="image/png" href="images/bank.png">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    // Suppress specific extension noise from the console
    const originalError = console.error
    const filterNoise = (msg) => {
      if (!msg) return false;
      const s = msg.toString();
      return s.includes('message channel closed before a response was received') ||
        s.includes('A listener indicated an asynchronous response by returning true');
    };

    console.error = (...args) => {
      if (filterNoise(args[0])) return;
      originalError.apply(console, args);
    };

    window.addEventListener('unhandledrejection', (event) => {
      if (filterNoise(event.reason)) {
        event.stopImmediatePropagation();
        event.preventDefault();
      }
    });
  </script>
</head>

<body>

  <nav>
    <div class="logo">
      <h3 id="companyName"></h3>
    </div>
    <div class="infosec">
      <div class="exit" id="settingsLink">
        <a href="user"><img src="images/sett.png" alt="user settings" title="User Settings"></a>
        <a href="./"><img src="images/exit.png" alt="exit" title="Exit"></a>
      </div>
      <div class="user-info">
        <img src="images/user.png" alt="user icon">
        <p id="branchNamehid"></p>
        <input type="hidden" id="hidbranchName">
        <input type="hidden" id="costcenter">
      </div>
    </div>
  </nav>
  <div id="toast" class="toast hidden">New transfer received!</div>
  <div class="adm_main_container">
    <div class="tabs">
      <button class="tab-button active" onclick="showTab('pending')"><img src="images/pending.png"
          alt="pending">Pending</button>
      <button class="tab-button" onclick="showTab('approved')"><img src="images/appved.png"
          alt="approved">Approved</button>
      <button class="tab-button" onclick="showTab('sent')"><img src="images/send.png" alt="send">Completed</button>
      <button class="tab-button" onclick="showTab('rejected')"><img src="images/rejected.png"
          alt="rejected">Rejected</button>
      <button class="tab-button" onclick="showTab('bankCharges')"><img src="images/bank.png" alt="bank charges">Bank
        Charges</button>
    </div>

    <div class="output_container">
      <div id="pending" class="tab-content">
        <div class="outsection">
          <h3>Pending List</h3>
          <div class="filter">
            <label for="fromdate_pending">From</label>
            <input type="date" id="fromdate_pending">
            <label for="todate_pending">To</label>
            <input type="date" id="todate_pending">
            <button class="filter-button" data-type="pending" title="Display"><img src="images/check.png"
                alt="Display"></button>
            <button class="primary-button" onclick="exportToExcel('pending')" title="Export to excel"><img
                src="images/excel.png" alt="Export"></button>
          </div>
        </div>
        <div id="pendingList"></div>
      </div>

      <div id="approved" class="tab-content hidden">
        <div class="outsection">
          <h3>Approved List (Cash Not Transferred)</h3>
          <div class="filter">
            <label for="fromdate_approved">From</label>
            <input type="date" id="fromdate_approved">
            <label for="todate_approved">To</label>
            <input type="date" id="todate_approved">
            <button class="filter-button" data-type="approved" title="Display"><img src="images/check.png"
                alt="Display"></button>
            <button class="primary-button" onclick="exportToExcel('approved')" title="Export to excel"><img
                src="images/excel.png" alt="Export"></button>
          </div>
        </div>
        <div id="approvedList"></div>
      </div>

      <div id="sent" class="tab-content hidden">
        <div class="outsection">
          <h3>Cash Transferred List</h3>
          <div class="filter">
            <label for="fromdate_sent">From</label>
            <input type="date" id="fromdate_sent">
            <label for="todate_sent">To</label>
            <input type="date" id="todate_sent">
            <button class="filter-button" data-type="sent" title="Display"><img src="images/check.png"
                alt="Display"></button>
            <button class="primary-button" onclick="exportToExcel('sent')" title="Export to excel"><img
                src="images/excel.png" alt="Export"></button>
          </div>
        </div>
        <div id="sentList"></div>
      </div>

      <div id="rejected" class="tab-content hidden">
        <div class="outsection">
          <h3>Rejected List</h3>
          <div class="filter">
            <label for="fromdate_rejected">From</label>
            <input type="date" id="fromdate_rejected">
            <label for="todate_rejected">To</label>
            <input type="date" id="todate_rejected">
            <button class="filter-button" data-type="rejected" title="Display"><img src="images/check.png"
                alt="Display"></button>
            <button class="primary-button" onclick="exportToExcel('rejected')" title="Export to excel"><img
                src="images/excel.png" alt="Export"></button>
          </div>
        </div>
        <div id="rejectedList"></div>
      </div>

      <div id="bankCharges" class="tab-content hidden">
        <div class="outsection">
          <h3>Bank Charges List</h3>
          <div class="filter">
            <label for="BranchName">Branch</label>
            <select name="BranchName" id="BranchName"></select>
            <label for="fromdate_bankCharges">From</label>
            <input type="date" id="fromdate_bankCharges">
            <label for="todate_bankCharges">To</label>
            <input type="date" id="todate_bankCharges">
            <button class="filter-button" data-type="bankCharges" title="Display"><img src="images/check.png"
                alt="Display"></button>
            <button class="primary-button" onclick="exportToExcel('bankCharges')" title="Export to excel"><img
                src="images/excel.png" alt="Export"></button>
          </div>
        </div>
        <div id="bankChargesList"></div>
      </div>
    </div>
  </div>

  <script type="module" src="js/admin.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
